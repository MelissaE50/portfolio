<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Arkansas Film Database Project">
  <meta name="keywords" content="JavaScript, HTML, CSS">
  <meta name="author" content="Melissa Ecker">
  <title>Arkansas Film Database</title>
  <link rel="stylesheet" type="text/css" href="assets/style/styleSheet.css">
</head>

<body>
  <main class="page-content">
    <div class="topPanel">
      <div class="header-overlay">
        <h1>Arkansas Film Database</h1>
        <h3>Highlighting Arkansas's Contributions to Film and Television</h3>
        <h2>Films</h2>
        <h3>Click on a Photo to Learn More</h3>
      </div>
    </div>

    <section class="film-gallery">
      <a class="film-card">
        <img src="assets/images/MUD.webp" alt="MUD">
        <span>MUD</span>
      </a>

      <a class="film-card">
        <img src="assets/images/aSoldiersStory.jpg" alt="A Soldier's Story">
        <span>A Soldier's Story</span>
      </a>

      <a class="film-card">
        <img src="assets/images/theTuskegeeAirmen.jpg" alt="The Tuskegee Airmen">
        <span>The Tuskegee Airmen</span>
      </a>

      <a class="film-card">
        <img src="assets/images/biloxiBlues.jpg" alt="Biloxi Blues">
        <span>Biloxi Blues</span>
      </a>

      <a class="film-card">
        <img src="assets/images/primaryColors.jpg" alt="Primary Colors">
        <span>Primary Colors</span>
      </a>

      <a class="film-card">
        <img src="assets/images/trueGrit.webp" alt="True Grit">
        <span>True Grit</span>
      </a>

      <a class="film-card">
        <img src="assets/images/walkTheLine.webp" alt="Walk the Line">
        <span>Walk the Line</span>
      </a>

      <a class="film-card">
        <img src="assets/images/arkansas.webp" alt="Arkansas">
        <span>Arkansas</span>
      </a>
    </section>
  </main>

  <footer class="footer">
    © 2026 Melissa Ecker
  </footer>

  <script src="assets/scripts/arkFilmDBP.js"></script>
</body>
</html>
