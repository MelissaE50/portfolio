<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Arkansas Film Database Project">
  <meta name="keywords" content="JavaScript, HTML, CSS">
  <meta name="author" content="Melissa Ecker">
  <title>Arkansas Film Database - Films</title>
  <link rel="stylesheet" href="assets/style/styleSheet.css">
</head>
<body>

  <main class="page-content">
    <div class="topPanel">
      <div class="header-overlay">
        <h1>Arkansas Film Database</h1>
        <h3>Highlighting Arkansas's Contributions to Film and Television</h3>
        <h2>Films</h2>

        <div class="nav-buttons">
          <a href="films.html" class="nav-btn">Films</a>
          <a href="actors-actresses.html" class="nav-btn">Actors/Actresses</a>
        </div>

        <form class="search-wrap" id="movieSearchForm">
          <input type="text" id="movieSearchInput" placeholder="Search for a movie">
          <button type="submit">Search</button>
        </form>
      </div>
    </div>

    <section class="film-gallery">
      <a href="movie.html?id=550" class="film-card">
        <img src="assets/images/slingBlade.jpg" alt="Sling Blade Movie Poster">
        <span>Sling Blade</span>
      </a>

      <a href="movie.html?id=274" class="film-card">
        <img src="assets/images/MUD.webp" alt="MUD Movie Poster">
        <span>MUD</span>
      </a>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Melissa Ecker</p>
  </footer>

  <script src="assets/scripts/arkFilmDBP.js"></script>
  <script src="assets/scripts/films.js"></script>
  <script src="assets/scripts/actors-actresses.js"></script>
</body>
</html>
